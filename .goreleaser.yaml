# goreleaser configuration for todui.
# Build cross-platform binaries and checksums on a tagged release:
#   git tag v0.1.0 && git push origin v0.1.0   (with goreleaser in CI)
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: todui
    main: ./cmd/todui
    binary: todui
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "todui_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
